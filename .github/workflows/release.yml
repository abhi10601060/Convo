name: Android Firebase App Distribution

on:
  push:
    branches:
      - feature/ci # Automatically executes when code is pushed or merged into the main branch

jobs:
  distribute:
    runs-on: ubuntu-latest

    # CRUCIAL: Point this directly to the environment you created under Settings > Environments
    environment: release

    # Explicit security permission blocks required for modern passwordless OIDC authentication
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      # 1. Checkout your multi-module source code repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Java Environment with automated Gradle dependency caching
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # 3. Regenerate the physical Keystore binary file on-the-fly inside the runner workspace
      - name: Decode Keystore File
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > app/release-keystore.jks

      # 4. Grant full shell execution rights to Gradle
      - name: Grant Execute Permission for Gradlew
        run: chmod +x ./gradlew

      # 5. Compile and sign the Release APK using environment mapping injected directly from Environment Secrets
      - name: Build and Sign Release APKs
        run: ./gradlew :app:assembleRelease
        env:
          KEYSTORE_PATH: "release-keystore.jks"
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      #6. Uploads a build to firebase app
      - name: Upload Artifact to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
          groups: testers
          file: app/build/outputs/apk/release/app-release.apk
          releaseNotes: "New release from GitHub Actions: ${{ github.event.head_commit.message }}"
